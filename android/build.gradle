// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// NDK 26.1 recommandé pour certains setups Windows (expo-modules-core + New Arch).
// Expo ne remplace pas `ext.ndkVersion` s'il est déjà défini (ExpoRootProjectPlugin#setIfNotExist).
//
// Si le SDK Android n'a qu'un NDK incomplet (erreur CXX1101 : pas de source.properties
// sous ndk/<version>/), réinstaller : supprimer ce dossier puis
//   sdkmanager --install "ndk;26.1.10909125"
// Contournement local : dans android/local.properties, définir ndk.version vers un NDK
// déjà complet (vérifier la présence de source.properties dans le dossier ndk).
def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
  localPropsFile.withInputStream { localProps.load(it) }
}
def ndkFromLocal = localProps.getProperty("ndk.version")?.trim()
ext.ndkVersion = (ndkFromLocal != null && ndkFromLocal.length() > 0) ? ndkFromLocal : "26.1.10909125"

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

